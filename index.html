<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Containers Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 4 CDN -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

<!-- Fixed Container -->
<div class="container bg-primary text-white p-4 mt-3">
  <h2>Fixed Container</h2>
  <p>This container has fixed width and is centered.</p>
</div>

<!-- Fluid Container -->
<div class="container-fluid bg-dark text-white p-4 mt-3">
  <h2>Fluid Container</h2>
  <p>This container takes full width of the screen.</p>
</div>

<!-- Example with Grid -->
<div class="container mt-4">
  <div class="row">
    <div class="col-md-4 bg-success text-white p-3">
      Column 1
    </div>
    <div class="col-md-4 bg-warning p-3">
      Column 2
    </div>
    <div class="col-md-4 bg-danger text-white p-3">
      Column 3
    </div>
  </div>
</div>

</body>
</html>
